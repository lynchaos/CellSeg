name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: printf '%s' "$KEYSTORE_BASE64" | base64 -d > ${{ runner.temp }}/release.jks

      - name: Build release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Sign APK
        env:
          KEYSTORE: ${{ runner.temp }}/release.jks
          KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          APKSIGNER=$(find "$ANDROID_SDK_ROOT/build-tools" -name apksigner -type f | sort -V | tail -1)
          mkdir -p dist
          "$APKSIGNER" sign \
            --ks "$KEYSTORE" \
            --ks-key-alias "$KEY_ALIAS" \
            --ks-pass "pass:$STORE_PASSWORD" \
            --key-pass "pass:$KEY_PASSWORD" \
            --out "dist/CellSeg-${GITHUB_REF_NAME}.apk" \
            app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Compute SHA-256
        id: sha
        run: |
          HASH=$(sha256sum dist/CellSeg-${GITHUB_REF_NAME}.apk | awk '{print $1}')
          echo "apk_sha256=${HASH}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: CellSeg ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          body: |
            ## SHA-256 checksums
            | Asset | SHA-256 |
            |---|---|
            | `CellSeg-${{ github.ref_name }}.apk` | `${{ steps.sha.outputs.apk_sha256 }}` |
          files: dist/CellSeg-*.apk
