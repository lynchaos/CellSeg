name: Feature request
description: Suggest an idea or improvement for CellSeg
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement!
        Please search existing issues first to avoid duplicates.

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this feature solve? Who would benefit?
      placeholder: "As a researcher using a 20× objective, I often need to…"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe what you'd like to happen. Be as specific as you can.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or alternative approaches you've tried?

  - type: dropdown
    id: area
    attributes:
      label: Feature area
      options:
        - Segmentation / inference
        - Image import / export
        - Metrics / analysis
        - UI / UX
        - Settings / calibration
        - Model management
        - Batch processing
        - Other
    validations:
      required: true
