name: Bug report
description: File a bug report for CellSeg
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report.
        Please provide as much detail as possible.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
      placeholder: "When I tap 'Run segmentation', the app crashes immediately."
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Step-by-step instructions to reproduce the issue.
      placeholder: |
        1. Import a TIFF image from gallery
        2. Set diameter to 50
        3. Tap "Run segmentation"
        4. App crashes
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen?
    validations:
      required: true

  - type: dropdown
    id: backend
    attributes:
      label: Segmentation backend used
      options:
        - Local (on-device ONNX)
        - Cloud (Hugging Face Gradio Space)
        - Both
        - Not applicable
    validations:
      required: true

  - type: input
    id: app-version
    attributes:
      label: CellSeg version
      placeholder: "e.g. 0.1.0 (Settings → About)"
    validations:
      required: true

  - type: input
    id: android-version
    attributes:
      label: Android version
      placeholder: "e.g. Android 14 (API 34)"
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: Device
      placeholder: "e.g. Pixel 8, Samsung Galaxy S24"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logcat output (optional)
      description: |
        If the app crashes, capture logs with:
        `adb logcat -d | grep -E "CellSeg|FATAL|AndroidRuntime" > crash.txt`
      render: shell
